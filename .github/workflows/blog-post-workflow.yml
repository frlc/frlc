name: Update News Feeds

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-all-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout único no início ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Security News ──────────────────────────────────────────────
      - name: 📰 Security News (The Hacker News)
        continue-on-error: true
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://feeds.feedburner.com/TheHackersNews"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: BLOG-POST-LIST
          committer_username: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. DevSecOps News ─────────────────────────────────────────────
      - name: 🛡️ DevSecOps News (The Hacker News)
        continue-on-error: true
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://thehackernews.com/feeds/posts/default/-/DevSecOps"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: DEVSECOPS-POST-LIST
          committer_username: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. DevOps News ────────────────────────────────────────────────
      - name: ⚙️ DevOps News (THN + DevOps.com)
        continue-on-error: true
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: >-
            https://thehackernews.com/feeds/posts/default/-/DevOps,
            https://devops.com/feed/
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: DEVOPS-POST-LIST
          committer_username: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. QA Automation News ─────────────────────────────────────────
      - name: 🤖 QA Automation News (TestRail + MoT + Panda + UltimateQA)
        continue-on-error: true
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: >-
            https://feeds.feedburner.com/gurock,
            https://feeds.feedburner.com/mottestingfeeds,
            https://automationpanda.com/feed,
            https://ultimateqa.com/feed
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: QA-POST-LIST
          committer_username: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com
          gh_token: ${{ secrets.GITHUB_TOKEN }}
